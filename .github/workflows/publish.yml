name: Publish to NPM

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    name: Test, Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install
      - name: Run unit tests
        run: bun test --coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Check types and formats
        run: bun run format:check && bun run typecheck
      - name: Build
        run: bun run build
      - name: Check if version changed
        id: version_check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view countrynormalizer version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Debug OIDC token
        run: |
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm" | jq -r '.value' | \
          cut -d. -f2 | base64 -d 2>/dev/null | jq .
      - name: Publish to NPM
        if: steps.version_check.outputs.changed == 'true'
        run: npm publish --provenance
